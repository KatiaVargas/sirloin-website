kind = "web"
previewPath = "/"
title = "Sirloin Stockade Forum Tlaquepaque"
version = "1.0.0"
id = "artifacts/sirloin-stockade-forum"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23956

[services.development]
run = "pnpm --filter @workspace/sirloin-stockade-forum run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sirloin-stockade-forum", "run", "build" ]
publicDir = "artifacts/sirloin-stockade-forum/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23956"
BASE_PATH = "/"
